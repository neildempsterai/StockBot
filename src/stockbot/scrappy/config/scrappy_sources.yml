  #   transport: rss
  #   enabled: false
  #   url: "TODO verify DOL RSS URL"
  #   focus_tags: [macro_labor]
  #   trust_tier: high

search:
  enabled_for_low_confidence: true
  confidence_threshold: 0.65
  max_queries_per_sprint: 6
  max_results_per_query: 8
  preferred_domains:
    - reuters.com
    - cnbc.com
    - marketwatch.com
    - finance.yahoo.com
    - bloomberg.com
    - seekingalpha.com
    - investing.com
    - benzinga.com
  query_templates:
    - "{symbol} earnings guidance analyst upgrade downgrade SEC filing"
    - "{symbol} merger litigation regulation buyback insider"
    - "{sector} sector news regulation outlook"
    - "{theme} macro rates inflation jobs oil geopolitics"

watchlist_rules:
  prioritize_watchlist_symbols: true
  prioritize_positions: true
  allow_macro_theme_runs: true
  max_symbols_per_run: 10

dedup:
  recrawl_days: 2
  min_candidates_to_proceed: 1
  junk_domains: []
  canonicalize_urls: true

extraction:
  max_evidence_snippets: 8
  max_symbols_per_note: 8
  sentiment_scale: "-1_to_1"
  require_source_url: true
