# Scrappy market-intel sources — Lane A (official) + Lane B (media).
# source_type: official | media
# transport: rss | rss_or_api | search
# trust_tier: high (official) | medium (curated media)
# focus_tags: catalyst/theme tags this source applies to

sources:
  - name: sec_edgar_xbrl
    source_type: official
    transport: rss
    enabled: true
    url: "https://www.sec.gov/Archives/edgar/xbrlrss.all.xml"
    focus_tags: [filings, sec_filing, 8-k, 10-q, 10-k, insider_activity]
    trust_tier: high

  - name: fed_releases
    source_type: official
    transport: rss
    enabled: true
    url: "https://www.federalreserve.gov/feeds/press_all.xml"
    focus_tags: [macro_rates, macro_inflation, macro_labor, regulation]
    trust_tier: high

  - name: bls_releases
    source_type: official
    transport: rss
    enabled: true
    url: "https://www.bls.gov/feed/bls_latest.rss"
    focus_tags: [macro_labor, macro_inflation]
    trust_tier: high

  - name: yahoo_finance_rss
    source_type: media
    transport: rss
    enabled: true
    url: "https://finance.yahoo.com/news/rssindex"
    focus_tags: []
    trust_tier: medium

  - name: benzinga_rss
    source_type: media
    transport: rss
    enabled: true
    url: "https://www.benzinga.com/feed"
    focus_tags: []
    trust_tier: medium

  # Optional: add more when URLs are verified
  # - name: bis_updates
  #   source_type: official
  #   transport: rss
  #   enabled: false
  #   url: "TODO verify BIS RSS URL"
