# Override to expose Postgres and Redis for local/CI; add validate service for Docker-native release gate.
# Run: docker compose -f infra/compose.yaml -f infra/compose.test.yaml up -d postgres redis
# Then: DATABASE_URL=... REDIS_URL=... pytest ...
# Docker-native gate: docker compose -f infra/compose.yaml -f infra/compose.test.yaml run --rm -v "$(pwd):/app" -w /app validate

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"
  redis:
    ports:
      - "127.0.0.1:6379:6379"

  validate:
    build:
      context: ..
      dockerfile: infra/Dockerfile.validate
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stockbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockbot}
      REDIS_URL: redis://redis:6379/0
      ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID:-dummy}
      ALPACA_API_SECRET_KEY: ${ALPACA_API_SECRET_KEY:-dummy}
      PYTHONPATH: /app:/app/src
    volumes:
      - ..:/app
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
