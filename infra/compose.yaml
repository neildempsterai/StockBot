# v0.1: Alpaca + Tailscale SSH. No published postgres/redis; UI internal-only.
# Deploy: docker --context um790 compose -f infra/compose.yaml up -d --build

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-stockbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-stockbot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-stockbot}"]
      interval: 5s
      timeout: 5s
      retries: 5
    # No ports: internal only

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No ports: internal only

  alpaca_market_gateway:
    build:
      context: ..
      dockerfile: infra/Dockerfile.gateway
      args:
        SERVICE: alpaca_market_gateway
    environment:
      ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID:?}
      ALPACA_API_SECRET_KEY: ${ALPACA_API_SECRET_KEY:?}
      REDIS_URL: redis://redis:6379/0
      FEED: iex
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  alpaca_trade_gateway:
    build:
      context: ..
      dockerfile: infra/Dockerfile.gateway
      args:
        SERVICE: alpaca_trade_gateway
    command: ["python", "-m", "stockbot.gateways.trade_gateway"]
    environment:
      ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID:?}
      ALPACA_API_SECRET_KEY: ${ALPACA_API_SECRET_KEY:?}
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stockbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockbot}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  alpaca_reconciler:
    build:
      context: ..
      dockerfile: infra/Dockerfile.gateway
      args:
        SERVICE: alpaca_reconciler
    command: ["python", "-m", "stockbot.gateways.reconciler"]
    environment:
      ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID:?}
      ALPACA_API_SECRET_KEY: ${ALPACA_API_SECRET_KEY:?}
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stockbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockbot}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.app
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stockbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockbot}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.app
    command: ["python", "-m", "worker.main"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stockbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockbot}
      REDIS_URL: redis://redis:6379/0
      ALPACA_API_KEY_ID: ${ALPACA_API_KEY_ID:?}
      ALPACA_API_SECRET_KEY: ${ALPACA_API_SECRET_KEY:?}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: ..
      dockerfile: infra/Dockerfile.app
    command: ["python", "-m", "scheduler.main"]
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-stockbot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-stockbot}
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ui:
    build:
      context: ..
      dockerfile: infra/Dockerfile.ui
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
